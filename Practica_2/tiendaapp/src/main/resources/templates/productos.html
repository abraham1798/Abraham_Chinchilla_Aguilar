<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos | TiendaApp</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-4">

    <div class="alert alert-success alert-dismissible fade show" th:if="${ok}">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${ok}">Operación realizada</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="mb-1">Productos</h1>
            <p class="text-muted" th:if="${filtro}" th:text="${filtro}">filtro</p>
            <p class="text-muted" th:unless="${filtro}">
                Total:
                <span class="badge bg-primary" th:text="${productos.size()}">0</span>
            </p>
        </div>
        <div class="d-flex gap-2">
            <a class="btn btn-primary" th:href="@{/productos/nuevo}">
                <i class="bi bi-plus-circle me-1"></i>Nuevo producto
            </a>
            <a href="/productos" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-clockwise me-1"></i>Ver todos
            </a>
        </div>
    </div>

    <div class="alert alert-warning" th:if="${productos.isEmpty()}">
        <i class="bi bi-exclamation-triangle me-2"></i>
        No hay productos para mostrar.
    </div>

    <div class="row g-3">
        <div class="col-12 col-md-6 col-lg-4" th:each="p, iter : ${productos}">

            <div class="card h-100 shadow-sm card-hover">
                <div class="card-body d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start">
                        <span class="badge bg-secondary mb-2" th:text="${p.categoria}">categoria</span>

                        <span class="stock-agotado small" th:if="${p.agotado}">
                            <i class="bi bi-x-circle"></i> Agotado
                        </span>
                        <span class="stock-bajo small" th:if="${p.bajoStock}">
                            <i class="bi bi-exclamation-triangle"></i> Bajo stock
                        </span>
                        <span class="stock-ok small" th:if="${!p.agotado and !p.bajoStock}">
                            <i class="bi bi-check-circle"></i> Disponible
                        </span>
                    </div>

                    <h5 class="card-title brand-accent" th:text="${p.nombre}">Nombre</h5>

                    <p class="text-muted small flex-grow-1" th:text="${p.descripcion}">descripcion</p>

                    <div class="d-flex justify-content-between align-items-center mt-2 mb-3">
                        <span class="h5 mb-0">
                            $<span th:text="${#numbers.formatDecimal(p.precio, 1, 2)}">0.00</span>
                        </span>
                        <small class="text-muted">
                            <i class="bi bi-box"></i>
                            <span th:text="${p.stock}">0</span> unidades
                        </small>
                    </div>

                    <div class="d-flex gap-1 mt-auto">
                        <a class="btn btn-outline-primary btn-sm flex-grow-1" th:href="@{/productos/{id}(id=${p.id})}">
                            <i class="bi bi-eye"></i> Detalle
                        </a>
                        
                        <a class="btn btn-outline-warning btn-sm" th:href="@{/productos/{id}/editar(id=${p.id})}">
                            <i class="bi bi-pencil"></i>
                        </a>

                        <button type="button" 
                                class="btn btn-outline-danger btn-sm" 
                                data-bs-toggle="modal" 
                                data-bs-target="#modalEliminar" 
                                th:data-id="${p.id}" 
                                th:data-nombre="${p.nombre}">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

</main>

<div class="modal fade" id="modalEliminar" tabindex="-1" aria-labelledby="modalEliminarLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title text-danger" id="modalEliminarLabel">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>Confirmar Eliminación
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                ¿Estás seguro de que deseas eliminar el producto <strong id="nombreProductoEliminar"></strong>? Esta acción no se puede deshacer.
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <form id="formEliminar" method="post">
                    <button type="submit" class="btn btn-danger">Eliminar Producto</button>
                </form>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/header :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const modalEliminar = document.getElementById('modalEliminar');
    if (modalEliminar) {
        modalEliminar.addEventListener('show.bs.modal', event => {
            const boton = event.relatedTarget;
            
            // Extraer información de los atributos th:data-*
            const id = boton.getAttribute('data-id');
            const nombre = boton.getAttribute('data-nombre');
            
            // Inyectar datos en el modal
            const elNombre = modalEliminar.querySelector('#nombreProductoEliminar');
            const elForm = modalEliminar.querySelector('#formEliminar');
            
            elNombre.textContent = nombre;
            elForm.setAttribute('action', `/productos/${id}/eliminar`);
        });
    }
</script>
</body>
</html>
