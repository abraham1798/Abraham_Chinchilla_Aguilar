<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${producto.id == null} ? 'Nuevo Producto | TiendaApp' : 'Editar Producto | TiendaApp'">Formulario | TiendaApp</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0">
                <div class="card-header brand-bg p-3">
                    <h3 class="card-title mb-0 text-white">
                        <i th:class="${producto.id == null} ? 'bi bi-plus-circle me-2' : 'bi bi-pencil-square me-2'"></i>
                        <span th:text="${producto.id == null} ? 'Nuevo Producto' : 'Editar Producto'">Formulario</span>
                    </h3>
                </div>
                <div class="card-body p-4">
                    
                    <form th:action="${producto.id == null} ? @{/productos} : @{/productos/{id}(id=${producto.id})}" 
                          th:object="${producto}" method="post">
                        
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label for="nombre" class="form-label fw-bold">Nombre del Producto</label>
                            <input type="text" th:field="*{nombre}" id="nombre" 
                                   class="form-control" th:errorclass="is-invalid" 
                                   placeholder="Ej. Teclado Mecánico RGB">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="categoria" class="form-label fw-bold">Categoría</label>
                            <input type="text" th:field="*{categoria}" id="categoria" 
                                   class="form-control" th:errorclass="is-invalid" 
                                   placeholder="Ej. Tecnología">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}"></div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="precio" class="form-label fw-bold">Precio ($)</label>
                                <div class="input-group">
                                    <span class="input-group-text">$</span>
                                    <input type="number" step="0.01" th:field="*{precio}" id="precio" 
                                           class="form-control" th:errorclass="is-invalid" 
                                           placeholder="0.00">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}"></div>
                                </div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="stock" class="form-label fw-bold">Stock Inicial</label>
                                <input type="number" th:field="*{stock}" id="stock" 
                                       class="form-control" th:errorclass="is-invalid" 
                                       placeholder="0">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="descripcion" class="form-label fw-bold">Descripción</label>
                            <textarea th:field="*{descripcion}" id="descripcion" rows="4" 
                                      class="form-control" th:errorclass="is-invalid" 
                                      placeholder="Escribí una breve descripción de las especificaciones del producto..."></textarea>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></div>
                        </div>

                        <div class="d-flex gap-2 justify-content-end border-top pt-3">
                            <a href="/productos" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle me-1"></i>Cancelar
                            </a>
                            <button type="submit" class="btn btn-success px-4">
                                <i class="bi bi-save me-1"></i>Guardar Producto
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/header :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
